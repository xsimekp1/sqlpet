name: EAS Build

on:
  push:
    branches: [main]
    paths:
      - 'apps/mobile/**'
      - '.github/workflows/eas-build.yml'
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build'
        required: true
        default: 'android'
        type: choice
        options:
          - android
          - ios
          - all
      profile:
        description: 'Build profile'
        required: true
        default: 'preview'
        type: choice
        options:
          - preview
          - production

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile
    env:
      PLATFORM: ${{ inputs.platform || 'android' }}
      PROFILE: ${{ inputs.profile || 'preview' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm install

      - name: Build Android
        if: ${{ env.PLATFORM == 'android' || env.PLATFORM == 'all' }}
        run: eas build --platform android --profile ${{ env.PROFILE }} --non-interactive --clear-cache

      - name: Build iOS
        if: ${{ env.PLATFORM == 'ios' || env.PLATFORM == 'all' }}
        run: eas build --platform ios --profile ${{ env.PROFILE }} --non-interactive --clear-cache
